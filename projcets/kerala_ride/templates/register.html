{% extends "base.html" %}

{% block title %}Sign Up - KeralaRide Connect{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="card glass-card">
            <h2 style="text-align: center; margin-bottom: 8px;">Create Account</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">Sign up as a passenger/cargo dispatcher</p>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Rahul Nair" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="10-digit mobile number" pattern="[0-9]{10}" title="Please enter a valid 10-digit mobile number" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Min. 6 chars" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; margin-bottom: 16px;">
                    <i class="fa-solid fa-user-plus"></i> Create User Account
                </button>
            </form>
            
            <div style="text-align: center; font-size: 14px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                <p>Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent-amber); font-weight: 600;">Sign In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
